name: Feature request
description: Propose a new analytics capability, provider integration, or UX improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation are you hitting today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe desired behavior and expected output
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Which modules are likely affected (`engine.py`, `data_provider.py`, `ui_components.py`, etc.)
